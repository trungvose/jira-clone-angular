<button [type]="type"
  [ngClass]="['btn', className, isActive ? 'is-active': '', content?.innerHTML?.trim() ? '': 'icon-only']"
  [disabled]="disabled">
  @if (!isWorking && icon) {
    <svg-icon
      [name]="icon"
      [size]="iconSize">
    </svg-icon>
  }
  @if (isWorking) {
    <svg-icon
      name="spin"
      class="spinner"
      [size]="iconSize">
    </svg-icon>
  }
  <span #content
    [class.with-padding]="isWorking || icon">
    <ng-content></ng-content>
  </span>
</button>
